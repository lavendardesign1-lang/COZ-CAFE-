<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم الطلب بنجاح - COZ CAFE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8B6914 0%, #D2B48C 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            color: #8B6914;
            font-size: 32px;
            margin-bottom: 15px;
        }

        .subtitle {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .order-details {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-right: 4px solid #D2B48C;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 16px;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #666;
            font-weight: 600;
        }

        .detail-value {
            color: #8B6914;
            font-weight: 700;
        }

        .order-items {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: right;
            border-right: 4px solid #D2B48C;
        }

        .order-items h3 {
            color: #8B6914;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-name {
            color: #333;
            font-weight: 600;
        }

        .item-price {
            color: #8B6914;
            font-weight: 700;
        }

        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8B6914 0%, #D2B48C 100%);
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #654321 0%, #C19A6B 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 105, 20, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #8B6914;
            flex: 1;
            min-width: 150px;
            border: 2px solid #D2B48C;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
            transform: translateY(-2px);
        }

        .info-box {
            background: #fffbf0;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border-right: 3px solid #D2B48C;
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        .info-box strong {
            color: #8B6914;
        }

        .status {
            display: inline-block;
            background: #d4edda;
            color: #155724;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .payment-status {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .payment-status.success {
            background: #d4edda;
            color: #155724;
            border-right: 3px solid #28a745;
        }

        .payment-status.pending {
            background: #fff3cd;
            color: #856404;
            border-right: 3px solid #ffc107;
        }

        .timer {
            font-size: 14px;
            color: #666;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #8B6914;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .success-container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 26px;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✅</div>
        
        <h1>تم الطلب بنجاح! 🎉</h1>
        
        <p class="subtitle">
            شكراً لك على طلبك من COZ CAFE<br>
            سيتم تحضير طلبك قريباً
        </p>

        <div class="status" id="paymentStatus">معلق</div>

        <div id="orderDetails" class="order-details"></div>

        <div id="orderItemsContainer" class="order-items" style="display: none;">
            <h3>📋 تفاصيل الطلب</h3>
            <div id="orderItemsList"></div>
        </div>

        <div class="payment-status pending" id="paymentInfo">
            <span class="loading-spinner"></span>
            <strong>⏳ حالة الدفع:</strong> جاري التحقق من الدفع...
        </div>

        <div class="buttons">
            <button class="btn btn-primary" onclick="goToTracking()" id="trackBtn" disabled>📍 متابعة الطلب</button>
            <button class="btn btn-secondary" onclick="makeNewOrder()">🛒 طلب جديد</button>
        </div>

        <div class="timer">
            <span id="redirectMessage">سيتم التوجيه لمتابعة الطلب بعد التحقق من الدفع...</span>
        </div>
    </div>

    <script>
        let lastOrder = null;
        let orderId = null;
        let checkCount = 0;
        let redirectScheduled = false;
        const MAX_CHECKS = 2; // ثانية واحدة تقريباً (2 × 0.5 ثانية)

        window.addEventListener('DOMContentLoaded', () => {
            // الحصول على order ID من URL
            const urlParams = new URLSearchParams(window.location.search);
            orderId = urlParams.get('order');
            
            loadOrderData();
            renderOrderDetails();
            
            // ابدأ التحقق من الدفع
            checkPaymentStatus();
            setInterval(checkPaymentStatus, 500); // كل نصف ثانية
        });

        function loadOrderData() {
            try {
                // اولاً حاول تحميل من lastOrder
                lastOrder = JSON.parse(localStorage.getItem('lastOrder'));
                
                // إذا ما فيه، حاول تحميل من tempOrder
                if (!lastOrder) {
                    lastOrder = JSON.parse(localStorage.getItem('tempOrder'));
                }
                
                // إذا ما فيه، حاول تحميل من cozOrders باستخدام orderId
                if (!lastOrder && orderId) {
                    const orders = JSON.parse(localStorage.getItem('cozOrders') || '[]');
                    lastOrder = orders.find(o => o.orderId === orderId);
                }
                
                if (!lastOrder) {
                    showEmptyState();
                }
            } catch (e) {
                console.error('Error:', e);
                showEmptyState();
            }
        }

        function checkPaymentStatus() {
            if (!lastOrder) return;
            
            checkCount++;
            
            // تحقق إذا الطلب تم تحديثه في localStorage من dashboard
            try {
                const orders = JSON.parse(localStorage.getItem('cozOrders') || '[]');
                const updatedOrder = orders.find(o => o.orderId === lastOrder.orderId);
                
                if (updatedOrder) {
                    lastOrder = updatedOrder;
                    paymentConfirmed();
                    return;
                }
            } catch (e) {
                console.error('Error checking status:', e);
            }
            
            // إذا انتهت المحاولات، افترض أن الدفع تم
            if (checkCount >= MAX_CHECKS) {
                paymentConfirmed();
            }
        }

        function paymentConfirmed() {
            if (redirectScheduled) return;
            redirectScheduled = true;

            // تحديث الحالة
            const paymentInfo = document.getElementById('paymentInfo');
            paymentInfo.innerHTML = '<strong>✅ تم الدفع بنجاح!</strong>';
            paymentInfo.className = 'payment-status success';
            
            const statusEl = document.getElementById('paymentStatus');
            statusEl.textContent = '✅ مؤكد';
            statusEl.style.background = '#d4edda';
            statusEl.style.color = '#155724';
            
            const trackBtn = document.getElementById('trackBtn');
            trackBtn.disabled = false;
            
            const redirectMessage = document.getElementById('redirectMessage');
            redirectMessage.textContent = '🎉 تم تأكيد الدفع! جاري التوجيه لمتابعة الطلب...';
            
            // توجيه تلقائي سريع بعد ثانية واحدة
            setTimeout(() => {
                goToTracking();
            }, 1000);
        }

        function renderOrderDetails() {
            if (!lastOrder) return;

            const orderDetails = document.getElementById('orderDetails');
            orderDetails.innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">رقم الطلب:</span>
                    <span class="detail-value">${lastOrder.orderId}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">الاسم:</span>
                    <span class="detail-value">${lastOrder.name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">المجموع:</span>
                    <span class="detail-value" style="font-size: 18px;">${lastOrder.total} AED</span>
                </div>
            `;

            if (lastOrder.items && lastOrder.items.length > 0) {
                document.getElementById('orderItemsContainer').style.display = 'block';
                let itemsHTML = '';
                lastOrder.items.forEach(item => {
                    itemsHTML += `
                        <div class="item">
                            <span class="item-name">${item.name} × ${item.quantity}</span>
                            <span class="item-price">${item.price * item.quantity} AED</span>
                        </div>
                    `;
                });
                document.getElementById('orderItemsList').innerHTML = itemsHTML;
            }
        }

        function showEmptyState() {
            document.getElementById('orderDetails').innerHTML = '<p style="color: #999;">لم يتم العثور على بيانات الطلب</p>';
        }

        function goToTracking() {
            if (lastOrder && lastOrder.orderId) {
                // حفظ الطلب في cozOrders قبل الانتقال
                try {
                    const orders = JSON.parse(localStorage.getItem('cozOrders') || '[]');
                    const index = orders.findIndex(o => o.orderId === lastOrder.orderId);
                    lastOrder.status = lastOrder.status || 'pending';
                    if (index >= 0) {
                        orders[index] = lastOrder;
                    } else {
                        orders.unshift(lastOrder);
                    }
                    localStorage.setItem('cozOrders', JSON.stringify(orders));
                    localStorage.setItem('lastOrder', JSON.stringify(lastOrder));
                } catch (e) {
                    console.error('Error:', e);
                }
                
                window.location.href = `tracking.html?order=${lastOrder.orderId}`;
            } else {
                goHome();
            }
        }

        function goHome() {
            localStorage.removeItem('lastOrder');
            localStorage.removeItem('tempOrder');
            window.location.href = 'index.html';
        }

        function makeNewOrder() {
            localStorage.removeItem('lastOrder');
            localStorage.removeItem('tempOrder');
            localStorage.removeItem('cozCart');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
