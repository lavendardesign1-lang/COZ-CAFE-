<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدفع ناجح - COZ CAFE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .success-container {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: scaleIn 0.6s ease-out;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        h1 {
            color: #28a745;
            font-size: 32px;
            margin-bottom: 15px;
        }

        .message {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .order-id {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-right: 4px solid #28a745;
        }

        .order-id label {
            color: #666;
            font-size: 14px;
            display: block;
            margin-bottom: 8px;
        }

        .order-id .id {
            color: #28a745;
            font-size: 20px;
            font-weight: 700;
        }

        .loading-text {
            color: #17a2b8;
            font-size: 14px;
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #28a745;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-right: 4px solid #f5c6cb;
            display: none;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 40px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: none;
        }

        .btn-home {
            background: #ccc;
            color: #333;
        }

        .btn-home:hover {
            background: #aaa;
        }

        .btn-track {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
        }

        .btn-track:hover {
            background: linear-gradient(135deg, #1e7e34 0%, #1aa179 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .info-box {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            border-right: 4px solid #17a2b8;
            margin-top: 30px;
            font-size: 14px;
            color: #0c5460;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .success-container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .success-icon {
                font-size: 60px;
                margin-bottom: 20px;
            }

            .buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✅</div>
        
        <h1>تم الدفع بنجاح!</h1>
        
        <div class="message">
            شكراً لك على تسوقك معنا 🎉<br>
            جاري نقلك لصفحة متابعة الطلب...
        </div>

        <div class="order-id" id="orderIdBox" style="display: none;">
            <label>رقم الطلب</label>
            <div class="id" id="orderId">-</div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="loading-text" id="loadingText">
            <div class="spinner"></div>
            <span id="loadingTextContent">جاري التحويل...</span>
        </div>

        <div class="buttons" id="buttons">
            <button class="btn btn-home" onclick="goHome()">🏠 العودة للرئيسية</button>
            <button class="btn btn-track" onclick="goToTracking()">📍 ذهب لمتابعة الطلب</button>
        </div>

        <div class="info-box">
            <strong>💡 ملاحظة:</strong><br>
            إذا لم تنتقل تلقائياً بعد بضع ثواني، اضغط على "متابعة الطلب"
        </div>
    </div>

    <script>
        let orderId = null;
        let autoRedirectTimeout = null;

        window.addEventListener('DOMContentLoaded', () => {
            // استخراج رقم الطلب من URL
            orderId = getOrderIdFromURL();
            
            if (orderId) {
                document.getElementById('orderId').textContent = orderId;
                document.getElementById('orderIdBox').style.display = 'block';
                
                // محاولة العثور على الطلب والتحويل
                setTimeout(() => {
                    verifyOrderAndRedirect();
                }, 800);
            } else {
                showError('لم يتم العثور على رقم الطلب. يرجى محاولة مجدداً');
            }
        });

        function getOrderIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('order');
        }

        function verifyOrderAndRedirect() {
            try {
                const orders = JSON.parse(localStorage.getItem('cozOrders') || '[]');
                const order = orders.find(o => o.orderId === orderId);

                if (order) {
                    console.log('✅ تم العثور على الطلب:', orderId);
                    
                    // الطلب موجود = الدفع تم بنجاح ✓
                    // انتقل لصفحة التتبع فوري (أقل من ثانية)
                    autoRedirectTimeout = setTimeout(() => {
                        window.location.href = 'tracking.html?order=' + orderId;
                    }, 200); // انتقال فوري جداً
                } else {
                    console.warn('⚠️ الطلب غير موجود:', orderId);
                    showError('لم يتم العثور على الطلب. قد يكون هناك تأخير في المعالجة.');
                    showButtons();
                }
            } catch (error) {
                console.error('خطأ في التحقق:', error);
                showError('حدث خطأ في معالجة الطلب');
                showButtons();
            }
        }

        function showError(message) {
            const errorBox = document.getElementById('errorMessage');
            errorBox.textContent = message;
            errorBox.style.display = 'block';
            document.getElementById('loadingText').style.display = 'none';
            showButtons();
        }

        function showButtons() {
            document.querySelectorAll('.btn').forEach(btn => btn.style.display = 'block');
        }

        function goToTracking() {
            if (autoRedirectTimeout) {
                clearTimeout(autoRedirectTimeout);
            }
            window.location.href = 'tracking.html?order=' + orderId;
        }

        function goHome() {
            if (autoRedirectTimeout) {
                clearTimeout(autoRedirectTimeout);
            }
            window.location.href = 'index.html';
        }

        // في حالة إغلاق الصفحة
        window.addEventListener('beforeunload', () => {
            if (autoRedirectTimeout) {
                clearTimeout(autoRedirectTimeout);
            }
        });
    </script>
</body>
</html>
