<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COZ CAFÉ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .success-banner {
            display: none;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .success-banner h3 {
            margin-bottom: 10px;
            font-size: 20px;
        }

        .success-banner p {
            margin: 5px 0;
            font-size: 14px;
        }

        .success-banner .order-id {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: bold;
            font-size: 16px;
        }

        .success-banner .banner-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .success-banner .btn-small {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .success-banner .btn-track {
            background: white;
            color: #28a745;
        }

        .success-banner .btn-track:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .success-banner .btn-new-order {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
        }

        .success-banner .btn-new-order:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .success-banner .close-banner {
            position: absolute;
            top: 10px;
            left: 10px;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .success-banner {
            position: relative;
        }
    </style>
</head>
<body>
    <!-- رسالة النجاح -->
    <div class="success-banner" id="successBanner">
        <button class="close-banner" onclick="closeBanner()">&times;</button>
        <h3>✅ تم الدفع بنجاح!</h3>
        <p>شكراً لك على طلبك من COZ CAFE</p>
        <div class="order-id">
            رقم الطلب: <span id="successOrderId">-</span>
        </div>
        <p>جاري تحضير طلبك...</p>
        <div class="banner-buttons">
            <button class="btn-small btn-track" onclick="goToTracking()">📍 تابع الطلب</button>
            <button class="btn-small btn-new-order" onclick="startNewOrder()">🛒 طلب جديد</button>
        </div>
    </div>

    <header>
        <div class="header-content">
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="ar">AR</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
            <div class="logo-section">
                <img src="images/Coz.jpg" alt="شعار COZ" class="logo" onerror="this.style.display='none'">
            </div>
            <nav class="nav-menu">
                <button class="nav-btn" onclick="goHome()" data-ar="الرئيسية" data-en="Home">الرئيسية</button>
                <button class="nav-btn order-btn" onclick="goProducts()" data-ar="بدء الطلب" data-en="Order">بدء الطلب</button>
                <button class="nav-btn" onclick="showMenuModal()" data-ar="القائمة" data-en="Menu">القائمة</button>
                <button class="nav-btn" onclick="showCartModal()">🛒 <span id="cart-count" class="cart-badge">0</span></button>
            </nav>
        </div>
    </header>

    <main>
        <!-- الصفحة الرئيسية -->
        <section id="home" class="section active">
            <div class="hero">
                <h2 data-ar="أهلاً بك في COZ ☕" data-en="Welcome to COZ ☕">أهلاً بك في COZ ☕</h2>
                <p data-ar="قهوتك المفضلة بانتظارك" data-en="Your favorite coffee is waiting">قهوتك المفضلة بانتظارك</p>
                <button class="btn" onclick="goProducts()" data-ar="بدء الطلب" data-en="Start Order">بدء الطلب</button>
            </div>
        </section>

        <!-- صفحة المنتجات -->
        <section id="products" class="section">
            <div class="container">
                <h2 data-ar="قائمة الطلب" data-en="Order List">قائمة الطلب</h2>
                <div id="products-list"></div>
            </div>
        </section>
    </main>

    <!-- نافذة القائمة (Menu) -->
    <div id="menu-modal" class="modal">
        <div class="modal-content menu-modal-content">
            <button class="close-btn" onclick="closeMenuModal()">&times;</button>
            <img src="images/Coz menu.PNG" alt="قائمة COZ" class="menu-image" onerror="this.parentElement.innerHTML+='<p class=\'no-img\'>Menu image not found</p>'">
        </div>
    </div>

    <!-- نافذة السلة -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeCartModal()">&times;</button>
            <h2 data-ar="🛒" data-en="🛒">🛒</h2>
            <div id="cart-items"></div>
            <div class="cart-footer">
                <div class="total-row">
                    <span data-ar="الإجمالي" data-en="Total">الإجمالي</span>
                    <span><strong id="total">0</strong> AED</span>
                </div>
                <button class="btn full-btn" onclick="goCheckout()" data-ar="الدفع →" data-en="Checkout →">الدفع →</button>
            </div>
        </div>
    </div>

    <!-- نافذة الدفع -->
    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeCheckoutModal()">&times;</button>
            <h2 data-ar="إتمام الطلب" data-en="Complete Order">إتمام الطلب</h2>
            <form id="checkout-form" onsubmit="submitOrder(event)">
                <input type="text" id="cust-name" placeholder="الاسم الكامل" data-ar-placeholder="الاسم الكامل" data-en-placeholder="Full Name" required>
                <input type="tel" id="cust-phone" placeholder="رقم الهاتف" data-ar-placeholder="رقم الهاتف" data-en-placeholder="Phone Number" required>
                <input type="text" id="cust-address" placeholder="العنوان" data-ar-placeholder="العنوان" data-en-placeholder="Address" required>
                <button type="submit" class="btn full-btn" data-ar="الدفع عبر زينه 💳" data-en="Pay with Ziina 💳">الدفع عبر زينه 💳</button>
            </form>
        </div>
    </div>

    <!-- نافذة تأكيد الطلب -->
    <div id="order-modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeOrderModal()">&times;</button>
            <div id="order-content"></div>
        </div>
    </div>

    <script src="script.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // التحقق من رسالة النجاح عند تحميل الصفحة
        window.addEventListener('DOMContentLoaded', () => {
            checkSuccessMessage();
        });

        function checkSuccessMessage() {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('order');

            if (orderId) {
                try {
                    const orders = JSON.parse(localStorage.getItem('cozOrders') || '[]');
                    const order = orders.find(o => o.orderId === orderId);

                    if (order) {
                        // عرض رسالة النجاح
                        document.getElementById('successOrderId').textContent = orderId;
                        document.getElementById('successBanner').style.display = 'block';

                        // تنظيف السلة بعد الدفع
                        localStorage.removeItem('cozCart');
                        updateCartBadge();

                        // تنظيف URL
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                } catch (e) {
                    console.error('Error checking order:', e);
                }
            }
        }

        function closeBanner() {
            document.getElementById('successBanner').style.display = 'none';
        }

        function goToTracking() {
            const orderId = document.getElementById('successOrderId').textContent;
            if (orderId && orderId !== '-') {
                window.location.href = 'tracking.html?order=' + orderId;
            }
        }

        function startNewOrder() {
            closeBanner();
            // تنظيف السلة
            localStorage.removeItem('cozCart');
            updateCartBadge();
            // الذهاب لقائمة المنتجات
            goProducts();
        }
    </script>
</body>
</html>
