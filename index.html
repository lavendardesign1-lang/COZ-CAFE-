<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COZ CAFÉ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="ar">AR</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
            <div class="logo-section">
                <img src="images/Coz.jpg" alt="شعار COZ" class="logo" onerror="this.style.display='none'">
            </div>
            <nav class="nav-menu">
                <button class="nav-btn" onclick="goHome()" data-ar="الرئيسية" data-en="Home">الرئيسية</button>
                <button class="nav-btn order-btn" onclick="goProducts()" data-ar="بدء الطلب" data-en="Order">بدء الطلب</button>
                <button class="nav-btn" onclick="showMenuModal()" data-ar="القائمة" data-en="Menu">القائمة</button>
                <button class="nav-btn" onclick="showCartModal()">🛒 <span id="cart-count" class="cart-badge">0</span></button>
            </nav>
        </div>
    </header>

    <main>
        <!-- الصفحة الرئيسية -->
        <section id="home" class="section active">
            <div class="hero">
                <h2 data-ar="أهلاً بك في COZ ☕" data-en="Welcome to COZ ☕">أهلاً بك في COZ ☕</h2>
                <p data-ar="قهوتك المفضلة بانتظارك" data-en="Your favorite coffee is waiting">قهوتك المفضلة بانتظارك</p>
                <button class="btn" onclick="goProducts()" data-ar="بدء الطلب" data-en="Start Order">بدء الطلب</button>
            </div>
        </section>

        <!-- صفحة المنتجات -->
        <section id="products" class="section">
            <div class="container">
                <h2 data-ar="قائمة الطلب" data-en="Order List">قائمة الطلب</h2>
                <div id="products-list"></div>
            </div>
        </section>
    </main>

    <!-- نافذة القائمة (Menu) -->
    <div id="menu-modal" class="modal">
        <div class="modal-content menu-modal-content">
            <button class="close-btn" onclick="closeMenuModal()">&times;</button>
            <img src="images/Coz menu.PNG" alt="قائمة COZ" class="menu-image" onerror="this.parentElement.innerHTML+='<p class=\'no-img\'>Menu image not found</p>'">
        </div>
    </div>

    <!-- نافذة السلة -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeCartModal()">&times;</button>
            <h2 data-ar="🛒" data-en="🛒">🛒</h2>
            <div id="cart-items"></div>
            <div class="cart-footer">
                <div class="total-row">
                    <span data-ar="الإجمالي" data-en="Total">الإجمالي</span>
                    <span><strong id="total">0</strong> AED</span>
                </div>
                <button class="btn full-btn" onclick="goCheckout()" data-ar="الدفع →" data-en="Checkout →">الدفع →</button>
            </div>
        </div>
    </div>

    <!-- نافذة الدفع -->
    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeCheckoutModal()">&times;</button>
            <h2 data-ar="إتمام الطلب" data-en="Complete Order">إتمام الطلب</h2>
            <form id="checkout-form" onsubmit="submitOrder(event)">
                <input type="text" id="cust-name" placeholder="الاسم الكامل" data-ar-placeholder="الاسم الكامل" data-en-placeholder="Full Name" required>
                <input type="tel" id="cust-phone" placeholder="رقم الهاتف" data-ar-placeholder="رقم الهاتف" data-en-placeholder="Phone Number" required>
                <input type="text" id="cust-address" placeholder="العنوان" data-ar-placeholder="العنوان" data-en-placeholder="Address" required>
                <button type="submit" class="btn full-btn" data-ar="الدفع عبر زينه 💳" data-en="Pay with Ziina 💳">الدفع عبر زينه 💳</button>
            </form>
        </div>
    </div>

    <!-- نافذة تأكيد الطلب -->
    <div id="order-modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeOrderModal()">&times;</button>
            <div id="order-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
