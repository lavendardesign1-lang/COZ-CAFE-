<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COZ CAFÉ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo-section">
                <img src="images/Coz.jpg" alt="شعار COZ" class="logo" onerror="this.style.display='none'">
            </div>
            <nav class="nav-menu">
                <button class="nav-btn" onclick="goHome()">الرئيسية</button>
                <button class="nav-btn order-btn" onclick="goProducts()">بدء الطلب</button>
                <button class="nav-btn menu-btn" onclick="showMenuModal()">Menu</button>
                <button class="nav-btn cart-btn" onclick="showCartModal()">🛒 السلة <span id="cart-count" class="cart-badge">0</span></button>
            </nav>
        </div>
    </header>

    <main>
        <!-- الصفحة الرئيسية -->
        <section id="home" class="section active">
            <div class="hero">
                <h2>أهلاً بك في COZ ☕</h2>
                <p>قهوتك المفضلة بانتظارك</p>
                <button class="btn" onclick="goProducts()">بدء الطلب</button>
            </div>
        </section>

        <!-- صفحة المنتجات -->
        <section id="products" class="section">
            <div class="container">
                <h2>قائمة الطلب</h2>
                <div id="products-list"></div>
            </div>
        </section>
    </main>

    <!-- نافذة القائمة (Menu) -->
    <div id="menu-modal" class="modal">
        <div class="modal-content menu-modal-content">
            <button class="close-btn" onclick="closeMenuModal()">&times;</button>
            <img src="images/Coz menu.PNG" alt="قائمة COZ" class="menu-image" onerror="this.parentElement.innerHTML+='<p class=\'no-img\'>Menu image not found</p>'">
        </div>
    </div>

    <!-- نافذة السلة -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeCartModal()">&times;</button>
            <h2>🛒 السلة</h2>
            <div id="cart-items"></div>
            <div class="cart-footer">
                <div class="total-row">
                    <span>الإجمالي</span>
                    <span><strong id="total">0</strong> AED</span>
                </div>
                <button class="btn full-btn" onclick="goCheckout()">الدفع →</button>
            </div>
        </div>
    </div>

    <!-- نافذة الدفع -->
    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeCheckoutModal()">&times;</button>
            <h2>إتمام الطلب</h2>
            <form id="checkout-form" onsubmit="submitOrder(event)">
                <input type="text" id="cust-name" placeholder="الاسم الكامل" required>
                <input type="tel" id="cust-phone" placeholder="رقم الهاتف" required>
                <input type="text" id="cust-address" placeholder="العنوان" required>
                <select id="cust-payment" required>
                    <option value="">اختر طريقة الدفع</option>
                    <option value="عند الاستلام">عند الاستلام</option>
                    <option value="Zain Pay">Zain Pay</option>
                </select>
                <button type="submit" class="btn full-btn">تأكيد الطلب ✓</button>
            </form>
        </div>
    </div>

    <!-- نافذة تأكيد الطلب -->
    <div id="order-modal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeOrderModal()">&times;</button>
            <div id="order-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
