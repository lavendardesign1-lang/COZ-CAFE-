<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة الطلب - COZ CAFE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8B6914 0%, #D2B48C 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .tracking-container {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .tracking-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .tracking-header h1 {
            color: #8B6914;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .tracking-header p {
            color: #666;
            font-size: 16px;
        }

        .order-number {
            background: #fffbf0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-right: 4px solid #D2B48C;
            text-align: center;
        }

        .order-number label {
            color: #666;
            font-size: 14px;
            display: block;
            margin-bottom: 8px;
        }

        .order-number .id {
            color: #8B6914;
            font-size: 24px;
            font-weight: 700;
        }

        .timeline {
            position: relative;
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .timeline-item {
            display: flex;
            margin-bottom: 30px;
            position: relative;
        }

        .timeline-item:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 20px;
            top: 50px;
            width: 2px;
            height: 30px;
            background: #D2B48C;
        }

        .timeline-dot {
            width: 50px;
            height: 50px;
            background: white;
            border: 3px solid #D2B48C;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 20px;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        .timeline-item.completed .timeline-dot {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }

        .timeline-item.pending .timeline-dot {
            background: #fff3cd;
            border-color: #ffc107;
            color: #ff9800;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .timeline-item.active .timeline-dot {
            background: #17a2b8;
            border-color: #17a2b8;
            color: white;
            animation: pulse 2s infinite;
        }

        .timeline-content {
            flex: 1;
            padding-top: 5px;
        }

        .timeline-content h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .timeline-content p {
            color: #666;
            font-size: 14px;
            margin: 3px 0;
        }

        .timeline-content .time {
            color: #999;
            font-size: 12px;
            margin-top: 8px;
        }

        .order-details {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-right: 4px solid #D2B48C;
        }

        .order-details h3 {
            color: #8B6914;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #666;
            font-weight: 600;
        }

        .detail-value {
            color: #333;
            font-weight: 600;
        }

        .items-list {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-right: 4px solid #D2B48C;
        }

        .items-list h3 {
            color: #8B6914;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-name {
            color: #333;
            font-weight: 600;
        }

        .item-price {
            color: #8B6914;
            font-weight: 700;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-home {
            background: #ccc;
            color: #333;
            flex: 1;
        }

        .btn-home:hover {
            background: #aaa;
        }

        .btn-refresh {
            background: linear-gradient(135deg, #8B6914 0%, #D2B48C 100%);
            color: white;
            flex: 1;
        }

        .btn-refresh:hover {
            background: linear-gradient(135deg, #654321 0%, #C19A6B 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 105, 20, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #8B6914;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .tracking-container {
                padding: 30px 20px;
            }

            .tracking-header h1 {
                font-size: 24px;
            }

            .timeline-item {
                margin-bottom: 20px;
            }

            .action-buttons {
                flex-direction: column;
            }
        }

        .status-update-info {
            background: #e7f3ff;
            border-right: 3px solid #17a2b8;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
            color: #0c5460;
        }

        .status-update-info strong {
            color: #17a2b8;
        }
    </style>
</head>
<body>
    <div class="tracking-container">
        <div class="tracking-header">
            <h1>📍 متابعة الطلب</h1>
            <p>تابع حالة طلبك الفوري</p>
        </div>

        <div id="trackingContent">
            <div class="loading">
                <div class="spinner"></div>
                <p>جاري تحميل بيانات الطلب...</p>
            </div>
        </div>
    </div>

    <script>
        let currentOrder = null;
        let refreshInterval = null;
        let pollCount = 0;

        window.addEventListener('DOMContentLoaded', () => {
            const orderId = getOrderIdFromURL();
            if (orderId) {
                loadOrder(orderId);
                // تحديث البيانات كل ثانية
                refreshInterval = setInterval(() => {
                    loadOrder(orderId);
                    pollCount++;
                }, 1000);
            } else {
                showEmptyState();
            }
        });

        window.addEventListener('beforeunload', () => {
            if (refreshInterval) clearInterval(refreshInterval);
        });

        function getOrderIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('order');
        }

        function loadOrder(orderId) {
            try {
                const orders = JSON.parse(localStorage.getItem('cozOrders') || '[]');
                const order = orders.find(o => o.orderId === orderId);
                
                if (order) {
                    currentOrder = order;
                    renderTracking();
                } else {
                    showEmptyState();
                }
            } catch (e) {
                console.error('Error loading order:', e);
                showEmptyState();
            }
        }

        function renderTracking() {
            if (!currentOrder) return;

            const status = currentOrder.status || 'pending';
            const content = document.getElementById('trackingContent');

            let html = `
                <div class="order-number">
                    <label>رقم الطلب</label>
                    <div class="id">${currentOrder.orderId}</div>
                </div>

                <div class="timeline">
                    ${getTimelineHTML(status)}
                </div>

                <div class="order-details">
                    <h3>📋 معلومات الطلب</h3>
                    <div class="detail-row">
                        <span class="detail-label">الاسم:</span>
                        <span class="detail-value">${currentOrder.name}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">رقم الهاتف:</span>
                        <span class="detail-value">${currentOrder.phone}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">رقم السيارة:</span>
                        <span class="detail-value">${currentOrder.carNumber || 'N/A'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">التاريخ والوقت:</span>
                        <span class="detail-value">${new Date(currentOrder.timestamp).toLocaleString('ar-SA')}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">المجموع:</span>
                        <span class="detail-value" style="font-size: 18px; color: #8B6914;">${currentOrder.total} AED</span>
                    </div>
                </div>

                <div class="items-list">
                    <h3>📦 المنتجات</h3>
                    ${currentOrder.items ? currentOrder.items.map(item => `
                        <div class="item">
                            <span class="item-name">${item.name} × ${item.quantity}</span>
                            <span class="item-price">${item.price * item.quantity} AED</span>
                        </div>
                    `).join('') : '<p style="color: #999;">لا توجد منتجات</p>'}
                </div>

                <div class="action-buttons">
                    <button class="btn btn-home" onclick="goHome()">🏠 الرئيسية</button>
                    <button class="btn btn-refresh" onclick="refreshTracking()">🔄 تحديث</button>
                </div>

                ${getStatusUpdateInfo(status)}
            `;

            content.innerHTML = html;
        }

        function getTimelineHTML(status) {
            const statuses = [
                { key: 'pending', icon: '⏳', title: 'في الانتظار', desc: 'جاري مراجعة الطلب' },
                { key: 'approved', icon: '✅', title: 'تم القبول', desc: 'تم قبول طلبك' },
                { key: 'preparing', icon: '👨‍🍳', title: 'قيد الإعداد', desc: 'جاري تحضير الطلب' },
                { key: 'ready', icon: '🚗', title: 'جاهز للتقديم', desc: 'طلبك جاهز الآن' },
                { key: 'completed', icon: '✔️', title: 'مكتمل', desc: 'تم استلام الطلب' }
            ];

            const statusIndex = statuses.findIndex(s => s.key === status);

            return statuses.map((s, index) => {
                let itemClass = '';
                if (index <= statusIndex) {
                    itemClass = index === statusIndex ? 'active' : 'completed';
                } else {
                    itemClass = 'pending';
                }

                return `
                    <div class="timeline-item ${itemClass}">
                        <div class="timeline-dot">${s.icon}</div>
                        <div class="timeline-content">
                            <h3>${s.title}</h3>
                            <p>${s.desc}</p>
                            <div class="time">${getTimeForStatus(s.key, status)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getTimeForStatus(statusKey, currentStatus) {
            if (statusKey === currentStatus) {
                return 'جاري الآن...';
            } else if (['pending', 'approved', 'preparing', 'ready'].indexOf(statusKey) <= ['pending', 'approved', 'preparing', 'ready'].indexOf(currentStatus)) {
                return 'تم';
            }
            return 'قادم...';
        }

        function getStatusUpdateInfo(status) {
            const statusMessages = {
                'pending': '⏳ طلبك في انتظار المراجعة. سيتم تحديثك قريباً',
                'approved': '✅ تم قبول طلبك! جاري التحضير',
                'preparing': '👨‍🍳 جاري تحضير طلبك الآن',
                'ready': '🚗 طلبك جاهز! تفضل للاستلام',
                'completed': '✔️ شكراً! تم استلام طلبك'
            };

            return `
                <div class="status-update-info">
                    <strong>📢 آخر تحديث:</strong> ${statusMessages[status] || 'جاري معالجة الطلب'}
                </div>
            `;
        }

        function showEmptyState() {
            const content = document.getElementById('trackingContent');
            content.innerHTML = `
                <div class="empty-state">
                    <div class="icon">❌</div>
                    <p>لم يتم العثور على الطلب</p>
                    <button class="btn btn-home" onclick="goHome()">العودة للرئيسية</button>
                </div>
            `;
        }

        function refreshTracking() {
            const orderId = getOrderIdFromURL();
            if (orderId) loadOrder(orderId);
        }

        function goHome() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
